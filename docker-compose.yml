services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB:       valory
      POSTGRES_USER:     valory_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valory_app -d valory"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "8443:8443"
      # Port 80 is NOT mapped to the host here because the frontend service already
      # binds host:80. The frontend (Nginx) proxies ACME HTTP-01 challenges to
      # http://api:80 via Docker's internal network — no host binding is required.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - acme_cache:/app/acme-cache
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  uploads:
  acme_cache:
